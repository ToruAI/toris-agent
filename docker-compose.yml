version: '3.8'

# Claude Voice Assistant - Docker Compose Configuration
# Runs multiple persona instances with isolated state and sandboxes

services:
  # ==========================================================================
  # V Persona - General Purpose Assistant
  # ==========================================================================
  v:
    build: .
    container_name: claude-voice-v
    env_file:
      - docker/v.env
    volumes:
      # Persistent state (session history, settings)
      - v-state:/home/claude/state
      # Isolated sandbox for file operations
      - v-sandbox:/home/claude/sandbox
      # Shared prompts directory (read-only)
      - ./prompts:/home/claude/app/prompts:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*bot.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voice-assistants

  # ==========================================================================
  # TC Persona - TORIS Copilot
  # ==========================================================================
  tc:
    build: .
    container_name: claude-voice-tc
    env_file:
      - docker/tc.env
    volumes:
      # Persistent state (session history, settings)
      - tc-state:/home/claude/state
      # Isolated sandbox for file operations
      - tc-sandbox:/home/claude/sandbox
      # Shared prompts directory (read-only)
      - ./prompts:/home/claude/app/prompts:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*bot.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voice-assistants

# ==============================================================================
# Named Volumes - Persistent Storage
# ==============================================================================
volumes:
  # V persona volumes
  v-state:
    driver: local
  v-sandbox:
    driver: local

  # TC persona volumes
  tc-state:
    driver: local
  tc-sandbox:
    driver: local

# ==============================================================================
# Networks
# ==============================================================================
networks:
  voice-assistants:
    driver: bridge
