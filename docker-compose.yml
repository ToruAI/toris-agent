# Claude Voice Assistant - Docker Compose
#
# Quick start:
#   cp docker/assistant.env.example docker/assistant.env
#   # Edit docker/assistant.env with your API keys
#   docker-compose up -d
#
# Logs:
#   docker-compose logs -f assistant
#
# Multiple personas:
#   Duplicate the service block with different env_file and volume names

services:
  assistant:
    build: .
    container_name: claude-voice-assistant
    env_file:
      - docker/assistant.env
    volumes:
      # Persistent state (session history, user settings)
      - assistant-state:/home/claude/state
      # Sandbox for Claude file operations
      - assistant-sandbox:/home/claude/sandbox
      # Prompts directory (read-only)
      - ./prompts:/home/claude/app/prompts:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*bot.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  assistant-state:
  assistant-sandbox:
